networks:
  roboshop:
    name: roboshop
    driver: bridge
    # external: true
services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb
    networks:
      - roboshop
  catalogue:
    image: catalogue:v1 
    container_name: catalogue
    networks:
      - roboshop
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
    networks:
      - name: roboshop
  user:
    image: user:v1
    container_name: user
    networks:
      - name: roboshop
    depends_on:
      - redis