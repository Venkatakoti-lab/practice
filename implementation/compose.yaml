networks:
  roboshop:
    name: roboshop
    driver: bridge
    # external: true
services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb
    networks:
      - roboshop
  catalogue:
    image: catalogue:v1 
    container_name: catalogue
    networks:
      - roboshop
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
    networks:
      - roboshop
  user:
    image: user:v1
    container_name: user
    networks:
      - roboshop
    depends_on:
      - redis
      - catalogue
  cart:
    image: cart:v1
    container_name: cart
    networks:
      - roboshop
    depends_on:
      - redis
      - catalogue
  mysql:
    image: mysql:v1 
    container_name: mysql 
    networks:
      - roboshop
  shipping:
    image: shipping:v1
    container_name: shipping
    networks:
      - roboshop
    depends_on:
      - mysql
      - cart
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=roboshop
      - RABBITMQ_DEFAULT_PASS=roboshop123
    networks:
      - roboshop
