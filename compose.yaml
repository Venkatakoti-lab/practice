networks:
  default:
    driver: bridge
    name: roboshop
    external: true
services:
  mongodb:
    image: koti0120/mongodb:v1
    container_name: mongodb
  catalogue:
    image: koti0120/catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    image: koti0120/user:v1
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    image: koti0120/cart:v1
    container_name: cart
    depends_on:
    - redis
    - catalogue
  mysql:
    image: koti0120/mysql:v1
    container_name: mysql
  shipping:
    image: koti0120/shipping:v1
    container_name: shipping
    depends_on:
    - cart
    - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  payment:
    image: koti0120/payment:v1
    container_name: payment
    depends_on:
    - cart
    - user
    - rabbitmq
    environment:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
  frontend:
    image: koti0120/web:v1
    container_name: frontend
    ports:
      - 80:80
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  