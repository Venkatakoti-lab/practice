networks:
  default:
    driver: bridge
    name: roboshop
    external: true
services:
  mongodb:
    image: koti0120/mongodb:1.0.0
    container_name: mongodb
  catalogue:
    image: koti0120/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    image: koti0120/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    image: koti0120/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  mysql:
    image: koti0120/mysql:1.0.0
    container_name: mysql
  shipping:
    image: koti0120/shipping:1.0.0
    container_name: shipping
    depends_on:
    - cart
    - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER=roboshop
      RABBITMQ_DEFAULT_PASS=roboshop123
  